server:
  port: 8080

spring:
  application:
    name: flight-sim-backend

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cabinsim?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: MyPassword0121
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射 (数据库 flight_no -> Java flightNo)
    map-underscore-to-camel-case: true
    # 打印 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl